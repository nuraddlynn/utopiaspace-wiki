name: Update Wiki on PR Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-wiki:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Append PR content
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          BODY="${{ github.event.pull_request.body }}"

          if [[ "$TITLE" == *"[OE]"* ]]; then
            FILE="oe-space.md"
          elif [[ "$TITLE" == *"[INDOOR]"* ]]; then
            FILE="indoor-space.md"
          elif [[ "$TITLE" == *"[DEV]"* ]]; then
            FILE="developer-space.md"
          else
            FILE="updates.md"
          fi

          {
            echo "## PR: $TITLE"
            if [[ -n "$BODY" ]]; then
              echo "$BODY"
            else
              echo "_No PR description provided._"
            fi
            echo ""
          } >> "$FILE"

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add updates.md oe-space.md indoor-space.md developer-space.md

          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi

          git commit -m "Auto update from PR"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
