name: Update Wiki on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  update-wiki:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Append PR content
        run: |
          echo "## PR: ${{ github.event.pull_request.title }}" >> updates.md
          echo "${{ github.event.pull_request.body }}" >> updates.md
          echo "" >> updates.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto update from PR"
          git push

      - name: Categorize PR
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if [[ "$TITLE" == *"[OE]"* ]]; then
            FILE="oe-space.md"
          elif [[ "$TITLE" == *"[INDOOR]"* ]]; then
            FILE="indoor-space.md"
          elif [[ "$TITLE" == *"[DEV]"* ]]; then
            FILE="developer-space.md"
          else
            FILE="updates.md"
          fi

          echo "## PR: $TITLE" >> $FILE
          echo "${{ github.event.pull_request.body }}" >> $FILE