name: Create AI Wiki Update Pages

on:
  pull_request:
    types: [closed]
  repository_dispatch:
    types:
      - sync-docs-update

permissions:
  contents: write
  pull-requests: read

jobs:
  create-update-pages:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.client_payload.target_ref || github.ref_name }}

      - name: Build wiki page catalog
        id: page-catalog
        shell: bash
        run: |
          {
            find . -maxdepth 1 -type f -name '*.md' -print
          } | sed 's|^\./||' | sort | while IFS= read -r file; do
            [[ "$file" == "updates.md" ]] && continue
            [[ "$file" == *"-update-pr-"* ]] && continue
            [[ "$file" == *"-update-commit-"* ]] && continue

            base_name="${file%.md}"
            alias_name="${base_name%-space}"
            alias_name="${alias_name%-guide}"

            printf '%s|%s\n' "$file" "$alias_name"
          done > page-catalog.txt

          echo "count=$(wc -l < page-catalog.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Set event metadata
        id: event-meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_TITLE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          SOURCE_EVENT: ${{ github.event.client_payload.source_event }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          SOURCE_TITLE: ${{ github.event.client_payload.title }}
          SOURCE_BODY: ${{ github.event.client_payload.body }}
          SOURCE_URL: ${{ github.event.client_payload.url }}
          SOURCE_SHA: ${{ github.event.client_payload.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            {
              echo "kind=pr"
              echo "id=$PR_NUMBER"
              echo "title<<EOF"
              echo "$PR_TITLE"
              echo "EOF"
              echo "body<<EOF"
              echo "$PR_BODY"
              echo "EOF"
              echo "url=$PR_URL"
              echo "file_suffix=pr-$PR_NUMBER"
              echo "commit_message=Create AI wiki update pages from merged PR"
              echo "summary_heading<<EOF"
              echo "PR #$PR_NUMBER: $PR_TITLE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "repository_dispatch" ]]; then
            source_kind="commit"
            source_id="${SOURCE_SHA:-external}"
            source_title="${SOURCE_TITLE:-Repository dispatch update}"
            source_body="${SOURCE_BODY:-$source_title}"
            source_url="${SOURCE_URL:-${{ github.server_url }}/${SOURCE_REPO}}"
            file_suffix="commit-${source_id:0:7}"
            commit_message="Create AI wiki update pages from external repository dispatch"
            summary_heading="External update"

            if [[ "$SOURCE_EVENT" == "pull_request" && -n "$SOURCE_PR_NUMBER" ]]; then
              source_kind="pr"
              source_id="$SOURCE_PR_NUMBER"
              file_suffix="pr-$SOURCE_PR_NUMBER"
              commit_message="Create AI wiki update pages from external merged PR"
              summary_heading="PR #$SOURCE_PR_NUMBER: $source_title"
            elif [[ -n "$SOURCE_SHA" ]]; then
              short_sha="${SOURCE_SHA::7}"
              source_id="$short_sha"
              file_suffix="commit-$short_sha"
              summary_heading="Commit $short_sha: $source_title"
            fi

            if [[ -n "$SOURCE_REPO" ]]; then
              source_body="${source_body}"$'\n\n'"Source repository: $SOURCE_REPO"
            fi

            {
              echo "kind=$source_kind"
              echo "id=$source_id"
              echo "title<<EOF"
              echo "$source_title"
              echo "EOF"
              echo "body<<EOF"
              echo "$source_body"
              echo "EOF"
              echo "url=$source_url"
              echo "file_suffix=$file_suffix"
              echo "commit_message=$commit_message"
              echo "summary_heading<<EOF"
              echo "$summary_heading"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            short_sha="${COMMIT_SHA::7}"
            {
              echo "kind=commit"
              echo "id=$short_sha"
              echo "title<<EOF"
              echo "$COMMIT_TITLE"
              echo "EOF"
              echo "body<<EOF"
              echo "$COMMIT_TITLE"
              echo "EOF"
              echo "url=$COMMIT_URL"
              echo "file_suffix=commit-$short_sha"
              echo "commit_message=Create AI wiki update pages from direct push"
              echo "summary_heading<<EOF"
              echo "Commit $short_sha: $COMMIT_TITLE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze event with Gemini
        id: analyze-event
        if: steps.page-catalog.outputs.count != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVENT_KIND: ${{ steps.event-meta.outputs.kind }}
          EVENT_ID: ${{ steps.event-meta.outputs.id }}
          EVENT_TITLE: ${{ steps.event-meta.outputs.title }}
          EVENT_BODY: ${{ steps.event-meta.outputs.body }}
          EVENT_URL: ${{ steps.event-meta.outputs.url }}
        shell: bash
        run: |
          if [[ -z "$GEMINI_API_KEY" ]]; then
            echo "Missing GEMINI_API_KEY secret." >&2
            exit 1
          fi

          CATALOG_JSON=$(node <<'NODE'
          const fs = require('fs')
          const lines = fs.readFileSync('page-catalog.txt', 'utf8').trim().split('\n').filter(Boolean)
          const catalog = lines.map((line) => {
            const [file, alias] = line.split('|')
            return { file, alias }
          })
          process.stdout.write(JSON.stringify(catalog))
          NODE
          )

          REQUEST_JSON=$(CATALOG_JSON="$CATALOG_JSON" node <<'NODE'
          const catalog = JSON.parse(process.env.CATALOG_JSON)
          const eventLabel = process.env.EVENT_KIND === 'pr' ? 'merged documentation PR' : 'direct documentation push'
          const payload = {
            contents: [
              {
                role: 'user',
                parts: [
                  {
                    text:
                      `You are classifying a ${eventLabel} into one or more Wiki.js update pages. Return JSON only. Split unrelated updates into separate items. Each item must map to exactly one existing wiki page from the provided catalog. Prefer the closest matching page. Use concise markdown in summary_markdown. Return at most one item per target_file.\n\nEvent type: ${process.env.EVENT_KIND}\nEvent id: ${process.env.EVENT_ID}\nTitle: ${process.env.EVENT_TITLE}\nURL: ${process.env.EVENT_URL}\nDescription:\n${process.env.EVENT_BODY || '(empty)'}\n\nAvailable wiki pages:\n${catalog.map((item) => `- ${item.file} (alias: ${item.alias})`).join('\n')}\n\nIf the text mentions both login and manager updates, return two items. Do not invent target files outside the catalog.`
                  }
                ]
              }
            ],
            generationConfig: {
              responseMimeType: 'application/json',
              responseJsonSchema: {
                type: 'object',
                properties: {
                  updates: {
                    type: 'array',
                    items: {
                      type: 'object',
                      properties: {
                        target_file: { type: 'string' },
                        target_alias: { type: 'string' },
                        update_title: { type: 'string' },
                        summary_markdown: { type: 'string' }
                      },
                      required: ['target_file', 'target_alias', 'update_title', 'summary_markdown']
                    }
                  }
                }
              },
              temperature: 0.2
            }
          }

          process.stdout.write(JSON.stringify(payload))
          NODE
          )

          RESPONSE=$(curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_JSON")

          printf '%s' "$RESPONSE" > gemini-response.json

          node <<'NODE'
          const fs = require('fs')

          const response = JSON.parse(fs.readFileSync('gemini-response.json', 'utf8'))
          if (response.error) {
            throw new Error(response.error.message || 'Gemini API error')
          }

          const outputText =
            response.candidates &&
            response.candidates[0] &&
            response.candidates[0].content &&
            response.candidates[0].content.parts &&
            response.candidates[0].content.parts[0] &&
            response.candidates[0].content.parts[0].text
              ? response.candidates[0].content.parts[0].text.trim()
              : ''

          if (!outputText) {
            throw new Error('No structured output returned from Gemini.')
          }

          const parsed = JSON.parse(outputText)
          fs.writeFileSync('update-plan.json', JSON.stringify(parsed, null, 2))
          NODE

      - name: Create update pages from AI plan
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVENT_KIND: ${{ steps.event-meta.outputs.kind }}
          EVENT_ID: ${{ steps.event-meta.outputs.id }}
          EVENT_TITLE: ${{ steps.event-meta.outputs.title }}
          EVENT_URL: ${{ steps.event-meta.outputs.url }}
          FILE_SUFFIX: ${{ steps.event-meta.outputs.file_suffix }}
          SUMMARY_HEADING: ${{ steps.event-meta.outputs.summary_heading }}
        run: |
          if [[ ! -f update-plan.json ]]; then
            echo "Missing update-plan.json." >&2
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs')
          const { execFileSync } = require('child_process')

          const plan = JSON.parse(fs.readFileSync('update-plan.json', 'utf8'))
          const catalogLines = fs.readFileSync('page-catalog.txt', 'utf8').trim().split('\n').filter(Boolean)
          const validTargets = new Map(
            catalogLines.map((line) => {
              const [file, alias] = line.split('|')
              return [file, alias]
            })
          )

          const eventKind = process.env.EVENT_KIND
          const eventId = process.env.EVENT_ID
          const eventTitle = process.env.EVENT_TITLE
          const eventUrl = process.env.EVENT_URL
          const fileSuffix = process.env.FILE_SUFFIX
          const summaryHeading = process.env.SUMMARY_HEADING
          const now = new Date().toISOString()
          const normalized = new Map()

          for (const item of plan.updates || []) {
            if (!validTargets.has(item.target_file)) {
              throw new Error(`Invalid target file from AI: ${item.target_file}`)
            }

            if (normalized.has(item.target_file)) {
              const current = normalized.get(item.target_file)
              current.summary_markdown = `${current.summary_markdown.trim()}\n\n${item.summary_markdown.trim()}`
              continue
            }

            normalized.set(item.target_file, { ...item })
          }

          const AUTO_UPDATE_HEADER = '## 🚀 Latest Updates'
          const AUTO_UPDATE_START = '<!-- AUTO-UPDATE-START -->'
          const AUTO_UPDATE_END = '<!-- AUTO-UPDATE-END -->'
          const ENTRY_START = '<!-- AUTO-UPDATE-ENTRY-START -->'
          const ENTRY_END = '<!-- AUTO-UPDATE-ENTRY-END -->'
          const MAX_PAGE_UPDATES = 10
          const displayTimestamp = new Intl.DateTimeFormat('en-US', {
            month: 'long',
            day: 'numeric',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true,
            timeZone: 'Asia/Kuala_Lumpur'
          }).format(new Date())

          function splitFrontMatter(markdown) {
            if (!markdown.startsWith('---\n')) {
              return { frontMatter: '', body: markdown }
            }

            const endIndex = markdown.indexOf('\n---\n', 4)
            if (endIndex === -1) {
              return { frontMatter: '', body: markdown }
            }

            return {
              frontMatter: markdown.slice(0, endIndex + 5),
              body: markdown.slice(endIndex + 5)
            }
          }

          function upsertLatestUpdatesSection(markdown, newEntries) {
            const { frontMatter, body } = splitFrontMatter(markdown)
            const blockRegex = new RegExp(
              `${AUTO_UPDATE_HEADER}\\n\\n${AUTO_UPDATE_START}\\n([\\s\\S]*?)\\n${AUTO_UPDATE_END}`
            )
            const existingMatch = body.match(blockRegex)
            const existingContent = existingMatch ? existingMatch[1].trim() : ''
            const existingEntries = []

            if (existingContent) {
              const entryRegex = new RegExp(`${ENTRY_START}\\n([\\s\\S]*?)\\n${ENTRY_END}`, 'g')
              let match
              while ((match = entryRegex.exec(existingContent)) !== null) {
                existingEntries.push(match[1].trim())
              }

              if (existingEntries.length === 0) {
                existingEntries.push(existingContent)
              }
            }

            const combinedEntries = [...newEntries, ...existingEntries]
              .filter(Boolean)
              .slice(0, MAX_PAGE_UPDATES)
              .map((entry) => `${ENTRY_START}\n${entry.trim()}\n${ENTRY_END}`)

            const managedBlock = [
              AUTO_UPDATE_HEADER,
              '',
              AUTO_UPDATE_START,
              ...combinedEntries,
              AUTO_UPDATE_END
            ].join('\n')

            const nextBody = existingMatch
              ? body.replace(blockRegex, managedBlock)
              : `${body.replace(/\s*$/, '')}\n\n${managedBlock}\n`

            return frontMatter ? `${frontMatter}${nextBody}` : nextBody
          }

          const updatedPages = []

          for (const item of normalized.values()) {
            const label = eventKind === 'pr' ? `PR number: #${eventId}` : `Commit: ${eventId}`
            const pageContent = fs.readFileSync(item.target_file, 'utf8')
            const entryMarkdown = [
              `### ${displayTimestamp} - ${item.update_title}`,
              '',
              `- ${label}`,
              `- Trigger: ${eventTitle}`,
              `- Link: ${eventUrl}`,
              '',
              item.summary_markdown.trim()
            ].join('\n')

            const nextContent = upsertLatestUpdatesSection(pageContent, [entryMarkdown])
            fs.writeFileSync(item.target_file, nextContent)

            updatedPages.push({
              file: item.target_file,
              pagePath: item.target_file.replace(/\.md$/, ''),
              entryMarkdown
            })
          }

          const updateDetails = updatedPages.map((page) => ({
            file: page.file,
            content: page.entryMarkdown
          }))

          function summarizeUpdates() {
            const fallback = {
              big_updates: updatedPages.map((page) => `Updated ${page.file} with a new latest-update entry.`),
              improvements: [],
              fixes: []
            }

            if (!process.env.GEMINI_API_KEY || updateDetails.length === 0) {
              return fallback
            }

            const payload = {
              contents: [
                {
                  role: 'user',
                  parts: [
                    {
                      text:
                        `Summarize these Wiki.js generated update pages into a weekly changelog. Return JSON only. Put feature additions and major documentation changes in big_updates. Put refinements, cleanups, and minor documentation improvements in improvements. Put bug fixes, resolved issues, and corrected problems in fixes. Keep bullets concise and user-friendly. Use plain text only, no markdown bullets.\n\nUpdate pages:\n${updateDetails.map((item) => `FILE: ${item.file}\n${item.content}`).join('\n\n---\n\n')}`
                    }
                  ]
                }
              ],
              generationConfig: {
                responseMimeType: 'application/json',
                responseJsonSchema: {
                  type: 'object',
                  properties: {
                    big_updates: { type: 'array', items: { type: 'string' } },
                    improvements: { type: 'array', items: { type: 'string' } },
                    fixes: { type: 'array', items: { type: 'string' } }
                  }
                },
                temperature: 0.3
              }
            }

            try {
              const responseText = execFileSync('curl', [
                '-sS',
                'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',
                '-H',
                `x-goog-api-key: ${process.env.GEMINI_API_KEY}`,
                '-H',
                'Content-Type: application/json',
                '-d',
                JSON.stringify(payload)
              ], {
                encoding: 'utf8',
                maxBuffer: 1024 * 1024 * 10
              })

              const response = JSON.parse(responseText)
              if (response.error) {
                throw new Error(response.error.message || 'Gemini API error while summarizing updates.')
              }

              const outputText =
                response.candidates &&
                response.candidates[0] &&
                response.candidates[0].content &&
                response.candidates[0].content.parts &&
                response.candidates[0].content.parts[0] &&
                response.candidates[0].content.parts[0].text
                  ? response.candidates[0].content.parts[0].text.trim()
                  : ''

              return outputText ? JSON.parse(outputText) : fallback
            } catch (error) {
              console.warn(`Falling back to basic weekly summary: ${error.message}`)
              return fallback
            }
          }

          const weeklySummary = summarizeUpdates()
          const displayDate = new Intl.DateTimeFormat('en-US', {
            month: 'long',
            day: 'numeric',
            year: 'numeric',
            timeZone: 'Asia/Kuala_Lumpur'
          }).format(new Date())
          const section = (items, fallbackText) =>
            items && items.length ? items.map((item) => `- ${item}`) : [`- ${fallbackText}`]

          const updatesIndex = [
            '---',
            'title: What’s New This Week',
            'description: Weekly summary of generated wiki update pages',
            'published: true',
            `date: ${now}`,
            `dateCreated: ${now}`,
            'tags: updates, ai-generated',
            'editor: markdown',
            '---',
            '',
            '# 🚀 What’s New This Week',
            '',
            `📅 ${displayDate}`,
            '',
            '## 🔥 Big Updates',
            '',
            ...section(weeklySummary.big_updates, 'No big updates recorded yet.'),
            '',
            '## ⚡ Improvements',
            '',
            ...section(weeklySummary.improvements, 'No improvements recorded yet.'),
            '',
            '## 🐛 Fixes',
            '',
            ...section(weeklySummary.fixes, 'No fixes recorded yet.'),
            '',
            '## 📚 Update Details',
            '',
            ...updatedPages.map((page) => {
              return `- [${page.file}](/${page.pagePath})`
            }),
            '',
            '## Latest Trigger',
            '',
            summaryHeading,
            ''
          ].join('\n')

          fs.writeFileSync('updates.md', `${updatesIndex}\n`)
          NODE

      - name: Commit generated update pages
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add updates.md *.md

          if git diff --cached --quiet; then
            echo "No generated update pages to commit."
            exit 0
          fi

          git commit -m "${{ steps.event-meta.outputs.commit_message }}"
          git push origin HEAD:${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.client_payload.target_ref || github.ref_name }}
