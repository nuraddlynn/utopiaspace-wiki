name: Update Docs from PR (AI)

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Install jq
      - name: Install jq
        run: sudo apt-get install jq

      # 3. Get PR diff
      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > pr_diff.txt

      # 4. Send to AI (SAFE VERSION - NO YAML ERROR)
      - name: Send to AI
        run: |
          DIFF=$(cat pr_diff.txt)

          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @- <<EOF
{
  "model": "gpt-4o-mini",
  "messages": [
    {
      "role": "system",
      "content": "Return simple structured text only."
    },
    {
      "role": "user",
      "content": "Analyze PR diff and choose documentation file.

Files:
api.md
database.md
architecture.md
basic-navigation.md
login-guide.md
end-user-guide.md
developer-space.md
announcements.md
faq.md
home.md

Rules:
APIâ†’api.md
Databaseâ†’database.md
Architectureâ†’architecture.md
UIâ†’basic-navigation.md
Loginâ†’login-guide.md
Developerâ†’developer-space.md
Bugâ†’announcements.md
Generalâ†’home.md

Return EXACT format:
file: api.md
content: your update here

PR Diff:
$DIFF"
    }
  ]
}
EOF
)

          echo "$RESPONSE" > ai_output.txt

      # 5. Extract AI result (NO JSON PARSE ISSUE)
      - name: Extract AI result
        run: |
          FILE=$(grep '^file:' ai_output.txt | sed 's/file: //')
          CONTENT=$(grep '^content:' ai_output.txt | sed 's/content: //')

          echo "Selected file: $FILE"
          echo "Content: $CONTENT"

          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "CONTENT=$CONTENT" >> $GITHUB_ENV

      # 6. Update markdown
      - name: Update markdown
        run: |
          touch $FILE
          echo "## PR Update - $(date)" >> $FILE
          echo "$CONTENT" >> $FILE
          echo "" >> $FILE

      # 7. Commit changes
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.md
          git commit -m "AI auto update docs from PR" || echo "No changes to commit"
          git push