name: Update Docs from PR (AI)

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  update-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get PR content
        run: |
          echo "${{ github.event.pull_request.title }}" > pr.txt
          echo "${{ github.event.pull_request.body }}" >> pr.txt

      - name: Send to AI
        run: |
          RESPONSE=$(curl https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"gpt-4o-mini\",\"messages\":[{\"role\":\"system\",\"content\":\"Reply ONLY like this: file: filename.md content: text\"},{\"role\":\"user\",\"content\":\"$(cat pr.txt)\"}]}")
          
          echo "$RESPONSE" > ai.txt

      - name: Extract result
        run: |
          FILE=$(cat ai.txt | grep -o 'file: [^ ]*' | cut -d' ' -f2)
          CONTENT=$(cat ai.txt | sed -n 's/.*content: //p')

          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "CONTENT=$CONTENT" >> $GITHUB_ENV

      - name: Update file
        run: |
          if [ -z "$FILE" ]; then
            echo "AI did not return file, fallback to announcements.md"
            FILE="announcements.md"
          fi

          touch $FILE
          echo "## PR Update" >> $FILE
          echo "$CONTENT" >> $FILE
          echo "" >> $FILE

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.md
          git commit -m "AI update docs" || echo "No changes"
          git push